services:
  - type: web
    name: ai-gmail-phishing-detector
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: EVENTLET_NO_GREENDNS=yes gunicorn --worker-class eventlet -w 1 --timeout 120 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: EVENTLET_NO_GREENDNS
        value: "yes"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: onboarding@resend.dev
